<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Kakiku Diario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="icon.png?v=3" />
    <link rel="apple-touch-icon" href="icon.png?v=3" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="topbar">
        <div class="brand">
          <img class="brand-icon" src="icon.png?v=3" alt="" aria-hidden="true" />
          <div>
            <h1>Kakiku</h1>
            <p id="challengeLabel">Reto diario</p>
          </div>
        </div>
      </header>

      <section class="mode-switch" aria-label="Tamaño del tablero">
        <button class="mode-button active" id="mode5Button" type="button" aria-pressed="true">5x5</button>
        <button class="mode-button" id="mode10Button" type="button" aria-pressed="false">10x10</button>
      </section>

      <section class="timer-row" aria-label="Tiempo de juego">
        <time id="timer">00:00.00</time>
      </section>

      <section class="board-shell" aria-label="Tablero de Kakiku">
        <div class="board" id="board"></div>
      </section>

      <section class="actions" aria-label="Acciones">
        <button class="round-button pause" id="pauseButtonBottom" type="button" aria-label="Pausar">
          <span class="material-symbols-rounded" aria-hidden="true">pause</span>
        </button>
      </section>

      <section class="pause-overlay is-hidden" id="pauseDialog" aria-labelledby="pauseTitle" aria-hidden="true">
        <div class="modal-card">
          <h2 id="pauseTitle">JUEGO EN PAUSA</h2>
          <button class="primary-action" id="continueButton" value="continue" type="button">Jugar</button>
          <button class="secondary-action" id="restartFromPause" value="restart" type="button" hidden>Reiniciar Día</button>
        </div>
      </section>

      <dialog class="modal" id="winDialog" aria-labelledby="winTitle">
        <form method="dialog" class="modal-card compact">
          <h2 id="winTitle">RETO COMPLETADO</h2>
          <p id="winStats">00:00.00</p>
          <button class="primary-action" id="copyResultButton" value="copy" type="button">Copiar resultado</button>
          <button class="primary-action" value="done" type="submit">Cerrar</button>
        </form>
      </dialog>
    </main>

    <script src="app.js"></script>
  </body>
</html>
